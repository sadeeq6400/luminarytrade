apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: luminarytrade-ingress
  namespace: luminarytrade
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  rules:
    - host: api.luminarytrade.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: luminarytrade-backend
                port:
                  number: 80
  tls:
    - hosts:
        - api.luminarytrade.com
      secretName: luminarytrade-tls
